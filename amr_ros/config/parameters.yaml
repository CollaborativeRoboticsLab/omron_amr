amr_core:
  ros__parameters:
    robot:
      ip: "192.168.1.1"
      port: 7272
      user: "admin"
      password: "admin"
      protocol: "6MTX"

    status:
      topic: "amr/status"
      battery_topic: "amr/battery_state"
      publish_period_ms: 200

    laser_scans:
      topic: "scan"
      frame_id: "laser_frame"
      request: "Laser_1Current"
      request_period_ms: 200
      angle_min: -3.14159         # -pi
      angle_max: 3.14159          # pi
      angle_increment: 0.00873    # pi/360
      range_min: 0.02
      range_max: 10.0

    driver:
      odom_topic: "/odom"
      cmd_vel_topic: "/cmd_vel"
      stop_topic: "/stop"
      odom_frame: "odom"
      base_frame: "base_link"
      min_linear_speed: -200.0    # mm/s
      max_linear_speed: 1200.0    # mm/s
      min_angular_speed: -60.0    # deg/s
      max_angular_speed: 60.0     # deg/s
      drive_throttle_pct: 100.0
      unsafe_drive: true
      cmd_vel_timeout_sec: 0.2
